<!DOCTYPE html>
<html>
<head>
  <title>Guided Builder</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    #left {
      width: 40%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
      background: #fff;
    }

    #right {
      width: 60%;
      padding: 10px;
    }

    .section {
      padding: 10px;
      border-bottom: 1px solid #eee;
      overflow-y: auto;
    }

    h3 {
      margin: 5px 0;
    }

    textarea {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
      padding: 6px;
      margin-top: 5px;
    }

    button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    #chatLog {
      height: 120px;
      overflow-y: auto;
      background: #f0f0f0;
      padding: 6px;
      border-radius: 6px;
      margin-bottom: 5px;
      font-size: 13px;
    }

    #fileTabs button {
      background: #e0e0e0;
      color: black;
      margin: 3px;
    }

    #fileTabs button.active {
      background: #007bff;
      color: white;
    }

    iframe {
      width: 100%;
      height: 95%;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: white;
    }

    #explanation {
      font-size: 13px;
      background: #eef;
      padding: 6px;
      border-radius: 6px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div id="left">

  <!-- STEP 1: CHAT -->
  <div class="section">
    <h3>💬 Chat</h3>
    <div id="chatLog"></div>
    <textarea id="chatInput" placeholder="Describe your app..."></textarea>
    <button onclick="processChat()">Send</button>
  </div>

  <!-- STEP 2 + 3: STRUCTURE -->
  <div class="section">
    <h3>📁 Structure</h3>
    <textarea id="structure"></textarea>
    <button onclick="applyStructure()">Apply</button>
  </div>

  <!-- STEP 4: GENERATION -->
  <div class="section">
    <button onclick="generateStep()">⚡ Generate Step</button>
    <p id="explanation">Waiting to generate...</p>
  </div>

  <!-- FILES -->
  <div class="section">
    <h3>📂 Files</h3>
    <div id="fileTabs"></div>
  </div>

  <!-- CODE -->
  <div class="section">
    <h3>💻 Code</h3>
    <textarea id="code" style="height:120px;"></textarea>
    <button onclick="applyCode()">Apply</button>
  </div>

</div>

<div id="right">
  <h2>👀 Preview</h2>
  <iframe id="preview"></iframe>
</div>

<script>

// ===== STATE =====
let step = 0;
let currentFile = "";
let files = {};

// ===== CHAT =====
function processChat() {
  const input = document.getElementById("chatInput").value;
  const log = document.getElementById("chatLog");

  log.innerHTML += `<div><b>You:</b> ${input}</div>`;

  let structure = `index.html\nstyle.css\nscript.js`;

  if (input.toLowerCase().includes("music")) {
    structure += `\naudio.js`;
  }

  log.innerHTML += `<div><b>AI:</b> I understood your app. Review structure and click Apply.</div>`;
  log.scrollTop = log.scrollHeight;

  document.getElementById("structure").value = structure;
}

// ===== FILE SYSTEM =====
function renderTabs() {
  const container = document.getElementById("fileTabs");
  container.innerHTML = "";

  for (let file in files) {
    const btn = document.createElement("button");
    btn.innerText = file;

    if (file === currentFile) btn.classList.add("active");

    btn.onclick = () => {
      saveCurrentFile();
      currentFile = file;
      loadCurrentFile();
      renderTabs();
    };

    container.appendChild(btn);
  }
}

function saveCurrentFile() {
  if (currentFile) {
    files[currentFile] = document.getElementById("code").value;
  }
}

function loadCurrentFile() {
  document.getElementById("code").value = files[currentFile] || "";
}

// ===== APPLY STRUCTURE =====
function applyStructure() {
  const lines = document.getElementById("structure").value.split("\n");

  files = {};
  lines.forEach(line => {
    const f = line.trim();
    if (f) files[f] = "";
  });

  step = 0;
  currentFile = Object.keys(files)[0] || "";

  renderTabs();
  loadCurrentFile();

  document.getElementById("explanation").innerText =
    "Structure applied. Start generating.";
}

// ===== GENERATE STEP =====
function generateStep() {

  const fileNames = Object.keys(files);

  if (fileNames.length === 0) {
    alert("Apply structure first");
    return;
  }

  if (step >= fileNames.length) {
    document.getElementById("explanation").innerText = "Build complete.";
    return;
  }

  currentFile = fileNames[step];

  document.getElementById("explanation").innerText =
    "Generating: " + currentFile;

  if (currentFile.endsWith(".html")) {
    files[currentFile] = `
      <h2>App UI</h2>
      <div id="app"></div>
    `;
  }

  else if (currentFile.endsWith(".css")) {
    files[currentFile] = `
      body { font-family: Arial; text-align:center; }
    `;
  }

  else if (currentFile.endsWith(".js")) {
    files[currentFile] = `
      document.getElementById("app").innerText = "App Loaded";
    `;
  }

  else {
    files[currentFile] = `// Code for ${currentFile}`;
  }

  step++;

  loadCurrentFile();
  renderTabs();
}

// ===== APPLY CODE =====
function applyCode() {
  saveCurrentFile();

  let html="", css="", js="";

  for (let f in files) {
    if (f.endsWith(".html")) html += files[f];
    else if (f.endsWith(".css")) css += files[f];
    else if (f.endsWith(".js")) js += files[f];
  }

  document.getElementById("preview").srcdoc =
    `<style>${css}</style>${html}<script>${js}<\/script>`;
}

// INIT
renderTabs();

</script>

</body>
</html>
