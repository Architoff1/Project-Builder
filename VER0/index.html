<!DOCTYPE html>
<html>
<head>
  <title>Guided Builder</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    #left { width: 40%; }
    #right { width: 60%; }

    textarea {
      width: 100%;
      height: 200px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: 1px solid black;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      cursor: pointer;
    }

    #explanation {
      background: #f0f0f0;
      padding: 10px;
      margin-top: 10px;
      border-left: 4px solid #333;
    }
  </style>
</head>

<body>

  <div id="left">
    <h2>🧠 Guided Builder</h2>

    <input id="prompt"
           placeholder="e.g. build calculator UI"
           style="width:100%; padding:10px;" />

    <button onclick="generateStep()">Generate Step</button>
    <button onclick="resetBuilder()">Reset</button>

    <p id="explanation">Step explanation will appear here</p>

    <h3>Generated Code</h3>
    <textarea id="code"></textarea>

    <button onclick="applyCode()">Apply</button>
  </div>

  <div id="right">
    <h2>👀 Live Preview</h2>
    <iframe id="preview"></iframe>
  </div>

<script>

let step = 0;
let currentCode = "";
let currentPrompt = "";

function generateStep() {
  const prompt = document.getElementById("prompt").value.trim();

  if (!prompt) {
    alert("Enter a prompt first");
    return;
  }

  // AUTO RESET if prompt changes
  if (currentPrompt && prompt !== currentPrompt) {
    resetBuilder();
  }

  currentPrompt = prompt;
  step++;

  // STEP 1: STRUCTURE
  if (step === 1) {
    document.getElementById("explanation").innerText =
      "Step 1: Creating base structure (HTML)";

    currentCode = `
      <h2>${prompt}</h2>
      <p>Basic UI created</p>
    `;
  }

  // STEP 2: UI ELEMENTS
  else if (step === 2) {
    document.getElementById("explanation").innerText =
      "Step 2: Adding UI elements (inputs/buttons)";

    currentCode += `
      <input id="input1" placeholder="Input 1">
      <input id="input2" placeholder="Input 2">
      <button onclick="action()">Run</button>
      <p id="output"></p>
    `;
  }

  // STEP 3: LOGIC
  else if (step === 3) {
    document.getElementById("explanation").innerText =
      "Step 3: Adding logic (JavaScript functionality)";

    currentCode += `
      <script>
        function action() {
          let a = document.getElementById('input1').value;
          let b = document.getElementById('input2').value;
          document.getElementById('output').innerText =
            "Output: " + a + " " + b;
        }
      <\/script>
    `;
  }

  // DONE
  else {
    document.getElementById("explanation").innerText =
      "Build complete.";

    alert("Done building!");
    return;
  }

  document.getElementById("code").value = currentCode;
}

function resetBuilder() {
  step = 0;
  currentCode = "";
  currentPrompt = "";

  document.getElementById("code").value = "";
  document.getElementById("preview").srcdoc = "";
  document.getElementById("explanation").innerText =
    "Builder reset. Start again.";
}

function applyCode() {
  const code = document.getElementById("code").value;
  document.getElementById("preview").srcdoc = code;
}

</script>

</body>
</html>
