<!DOCTYPE html>
<html>
<head>
  <title>Guided Builder IDE-lite</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    #left { width: 40%; }
    #right { width: 60%; }

    textarea {
      width: 100%;
      height: 200px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: 1px solid black;
    }

    button {
      margin: 5px 5px 5px 0;
      padding: 8px;
      cursor: pointer;
    }

    #explanation {
      background: #f0f0f0;
      padding: 10px;
      margin-top: 10px;
      border-left: 4px solid #333;
    }

    #fileTabs button {
      margin-right: 5px;
    }
  </style>
</head>

<body>

  <div id="left">
    <h2>🧠 Guided Builder</h2>

    <input id="prompt"
           placeholder="e.g. build calculator UI"
           style="width:100%; padding:10px;" />

    <br>

    <button onclick="generateStep()">Generate Step</button>
    <button onclick="resetBuilder()">Reset</button>

    <p id="explanation">Step explanation will appear here</p>

    <h3>Files</h3>
    <div id="fileTabs"></div>

    <h3>Generated Code</h3>
    <textarea id="code"></textarea>

    <button onclick="applyCode()">Apply</button>
  </div>

  <div id="right">
    <h2>👀 Live Preview</h2>
    <iframe id="preview"></iframe>
  </div>

<script>

// ===== STATE =====
let step = 0;
let currentPrompt = "";
let currentFile = "index.html";

let files = {
  "index.html": "",
  "style.css": "",
  "script.js": ""
};

// ===== FILE SYSTEM =====
function renderTabs() {
  const container = document.getElementById("fileTabs");
  container.innerHTML = "";

  for (let file in files) {
    const btn = document.createElement("button");
    btn.innerText = file;

    btn.onclick = () => {
      saveCurrentFile();
      currentFile = file;
      loadCurrentFile();
    };

    container.appendChild(btn);
  }
}

function saveCurrentFile() {
  files[currentFile] = document.getElementById("code").value;
}

function loadCurrentFile() {
  document.getElementById("code").value = files[currentFile];
}

// ===== BUILDER =====
function generateStep() {
  const prompt = document.getElementById("prompt").value.trim();

  if (!prompt) {
    alert("Enter a prompt first");
    return;
  }

  // Reset if prompt changes
  if (currentPrompt && prompt !== currentPrompt) {
    resetBuilder();
  }

  currentPrompt = prompt;
  step++;

  // STEP 1 → HTML STRUCTURE
  if (step === 1) {
    currentFile = "index.html";

    document.getElementById("explanation").innerText =
      "Step 1: Creating HTML structure";

    files["index.html"] = `
      <h2>${prompt}</h2>
      <div id="app"></div>
    `;
  }

  // STEP 2 → CSS
  else if (step === 2) {
    currentFile = "style.css";

    document.getElementById("explanation").innerText =
      "Step 2: Adding styling (CSS)";

    files["style.css"] = `
      body { font-family: Arial; text-align: center; }
      #app { margin-top: 20px; }
      input { margin: 5px; padding: 5px; }
      button { padding: 5px 10px; }
    `;
  }

  // STEP 3 → JS + UI injection
  else if (step === 3) {
    currentFile = "script.js";

    document.getElementById("explanation").innerText =
      "Step 3: Adding functionality (JavaScript)";

    // Inject UI into HTML properly
    files["index.html"] += `
      <input id="input1" placeholder="Input 1">
      <input id="input2" placeholder="Input 2">
      <button onclick="runApp()">Run</button>
      <p id="output"></p>
    `;

    files["script.js"] = `
      function runApp() {
        let a = document.getElementById('input1').value;
        let b = document.getElementById('input2').value;

        document.getElementById('output').innerText =
          "Output: " + a + " " + b;
      }
    `;
  }

  // DONE
  else {
    document.getElementById("explanation").innerText = "Build complete.";
    alert("Done building!");
    return;
  }

  loadCurrentFile();
}

// ===== APPLY =====
function applyCode() {
  saveCurrentFile();

  const html = files["index.html"] || "";
  const css = files["style.css"] || "";
  const js = files["script.js"] || "";

  const fullCode = `
    <style>${css}</style>
    ${html}
    <script>${js}<\/script>
  `;

  document.getElementById("preview").srcdoc = fullCode;
}

// ===== RESET =====
function resetBuilder() {
  step = 0;
  currentPrompt = "";
  currentFile = "index.html";

  files = {
    "index.html": "",
    "style.css": "",
    "script.js": ""
  };

  document.getElementById("code").value = "";
  document.getElementById("preview").srcdoc = "";
  document.getElementById("explanation").innerText =
    "Builder reset. Start again.";

  renderTabs();
  loadCurrentFile();
}

// ===== INIT =====
renderTabs();
loadCurrentFile();

</script>

</body>
</html>
