<!DOCTYPE html>
<html>
<head>
  <title>Guided Builder IDE-lite</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    #left { width: 40%; }
    #right { width: 60%; }

    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: 1px solid black;
    }

    button {
      margin: 5px 5px 5px 0;
      padding: 8px;
      cursor: pointer;
    }

    #explanation {
      background: #f0f0f0;
      padding: 10px;
      margin-top: 10px;
      border-left: 4px solid #333;
    }

    #fileTabs button {
      margin-right: 5px;
    }
  </style>
</head>

<body>

  <div id="left">
    <h2>🧠 Guided Builder</h2>

    <input id="prompt"
           placeholder="e.g. build calculator UI"
           style="width:100%; padding:10px;" />

    <br>

    <button onclick="generateStep()">Generate Step</button>
    <button onclick="resetBuilder()">Reset</button>

    <p id="explanation">Step explanation will appear here</p>

    <!-- 🔥 NEW: STRUCTURE PHASE -->
    <h3>Project Structure</h3>
    <textarea id="structure" placeholder="e.g.
index.html
style.css
script.js"></textarea>

    <button onclick="applyStructure()">Apply Structure</button>

    <h3>Files</h3>
    <div id="fileTabs"></div>

    <h3>Generated Code</h3>
    <textarea id="code"></textarea>

    <button onclick="applyCode()">Apply</button>
  </div>

  <div id="right">
    <h2>👀 Live Preview</h2>
    <iframe id="preview"></iframe>
  </div>

<script>

// ===== STATE =====
let step = 0;
let currentPrompt = "";
let currentFile = "";

let files = {};

// ===== FILE SYSTEM =====
function renderTabs() {
  const container = document.getElementById("fileTabs");
  container.innerHTML = "";

  for (let file in files) {
    const btn = document.createElement("button");
    btn.innerText = file;

    btn.onclick = () => {
      saveCurrentFile();
      currentFile = file;
      loadCurrentFile();
    };

    container.appendChild(btn);
  }
}

function saveCurrentFile() {
  if (currentFile) {
    files[currentFile] = document.getElementById("code").value;
  }
}

function loadCurrentFile() {
  document.getElementById("code").value = files[currentFile] || "";
}

// ===== STRUCTURE SYSTEM =====
function applyStructure() {
  const structureText = document.getElementById("structure").value;

  files = {};
  const lines = structureText.split("\n");

  lines.forEach(line => {
    const file = line.trim();
    if (file) {
      files[file] = "";
    }
  });

  renderTabs();

  currentFile = Object.keys(files)[0] || "";
  loadCurrentFile();

  document.getElementById("explanation").innerText =
    "Structure applied. Now generate steps.";
}

// ===== BUILDER =====
function generateStep() {
  const prompt = document.getElementById("prompt").value.trim();

  if (!prompt) {
    alert("Enter a prompt first");
    return;
  }

  if (Object.keys(files).length === 0) {
    alert("Define structure first");
    return;
  }

  // Reset if prompt changes
  if (currentPrompt && prompt !== currentPrompt) {
    resetBuilder();
    return;
  }

  currentPrompt = prompt;
  step++;

  const fileNames = Object.keys(files);

  if (step > fileNames.length) {
    document.getElementById("explanation").innerText = "Build complete.";
    alert("Done building!");
    return;
  }

  currentFile = fileNames[step - 1];

  document.getElementById("explanation").innerText =
    "Editing file: " + currentFile;

  // Basic simulation logic (will be replaced by AI later)
  if (currentFile.includes("html")) {
    files[currentFile] = `
      <h2>${prompt}</h2>
      <div id="app"></div>
    `;
  }

  else if (currentFile.includes("css")) {
    files[currentFile] = `
      body { font-family: Arial; }
      #app { margin-top: 20px; }
    `;
  }

  else if (currentFile.includes("js")) {
    files[currentFile] = `
      document.getElementById("app").innerText = "Logic loaded";
    `;
  }

  else {
    files[currentFile] = `// Code for ${currentFile}`;
  }

  loadCurrentFile();
}

// ===== APPLY =====
function applyCode() {
  saveCurrentFile();

  let html = "";
  let css = "";
  let js = "";

  for (let file in files) {
    if (file.endsWith(".html")) html += files[file];
    else if (file.endsWith(".css")) css += files[file];
    else if (file.endsWith(".js")) js += files[file];
  }

  const fullCode = `
    <style>${css}</style>
    ${html}
    <script>${js}<\/script>
  `;

  document.getElementById("preview").srcdoc = fullCode;
}

// ===== RESET =====
function resetBuilder() {
  step = 0;
  currentPrompt = "";
  currentFile = "";

  files = {};

  document.getElementById("structure").value = "";
  document.getElementById("code").value = "";
  document.getElementById("preview").srcdoc = "";

  document.getElementById("explanation").innerText =
    "Builder reset. Define structure again.";

  renderTabs();
}

renderTabs();

</script>

</body>
</html>
