<!DOCTYPE html>
<html>
<head>
  <title>Guided Builder</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #f4f6f8;
    }

    #left {
      width: 38%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
      padding: 10px;
      gap: 10px;
    }

    #right {
      width: 62%;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }

    .card h3 {
      margin: 0 0 5px 0;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
      padding: 6px;
      resize: none;
    }

    button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #1e4fd1;
    }

    .btn-row {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    #chatLog {
      height: 140px;
      overflow-y: auto;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 5px;
    }

    #fileTabs {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    #fileTabs button {
      background: #e5e7eb;
      color: black;
    }

    #fileTabs button.active {
      background: #2563eb;
      color: white;
    }

    #explanation {
      font-size: 12px;
      background: #eef2ff;
      padding: 6px;
      border-radius: 6px;
      margin-top: 5px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
    }

    /* HEIGHT CONTROL */
    #chatInput { height: 60px;}
    #chatCard { height: 28%; }
    #structureCard { height: 16%; }
    #controlCard { height: 10%; }
    #filesCard { height: 10%; }
    #codeCard { height:36%; }
  </style>
</head>

<body>

<!-- LEFT PANEL -->
<div id="left">

  <!-- CHAT -->
  <div class="card" id="chatCard">
    <h3>💬 Chat</h3>
    <div id="chatLog"></div>
    <textarea id="chatInput" placeholder="Describe your app..."></textarea>
    <button onclick="processChat()">Send</button>
  </div>

  <!-- STRUCTURE -->
  <div class="card" id="structureCard">
    <h3>📁 Structure</h3>
    <textarea id="structure"></textarea>
    <button onclick="applyStructure()">Apply</button>
  </div>

  <!-- CONTROLS -->
  <div class="card" id="controlCard">
    <h3>⚙️ Controls</h3>
    <div class="btn-row">
      <button onclick="generateStep()">⚡ Generate</button>
      <button onclick="resetBuilder()" style="background:#ef4444;">Reset</button>
    </div>
    <div id="explanation">Waiting...</div>
  </div>

  <!-- FILES -->
  <div class="card" id="filesCard">
    <h3>📂 Files</h3>
    <div id="fileTabs"></div>
  </div>

  <!-- CODE -->
  <div class="card" id="codeCard">
    <h3>💻 Code</h3>
    <textarea id="code" style="height:100%;"></textarea>
    <button onclick="applyCode()">Apply</button>
  </div>

</div>

<!-- RIGHT PANEL -->
<div id="right">
  <iframe id="preview"></iframe>
</div>

<script>

// ===== STATE =====
let step = 0;
let currentFile = "";
let files = {};

// ===== CHAT =====
function processChat() {
  const input = document.getElementById("chatInput").value;
  const log = document.getElementById("chatLog");

  log.innerHTML += `<div><b>You:</b> ${input}</div>`;

  let structure = `index.html\nstyle.css\nscript.js`;

  if (input.toLowerCase().includes("music")) {
    structure += `\naudio.js`;
  }

  log.innerHTML += `<div><b>AI:</b> Structure ready → Apply next</div>`;
  log.scrollTop = log.scrollHeight;

  document.getElementById("structure").value = structure;

  // UX FIX
  document.getElementById("chatInput").value = "";
}

// ===== FILE SYSTEM =====
function renderTabs() {
  const container = document.getElementById("fileTabs");
  container.innerHTML = "";

  for (let file in files) {
    const btn = document.createElement("button");
    btn.innerText = file;

    if (file === currentFile) btn.classList.add("active");

    btn.onclick = () => {
      saveCurrentFile();
      currentFile = file;
      loadCurrentFile();
      renderTabs();
    };

    container.appendChild(btn);
  }
}

function saveCurrentFile() {
  if (currentFile) {
    files[currentFile] = document.getElementById("code").value;
  }
}

function loadCurrentFile() {
  document.getElementById("code").value = files[currentFile] || "";
}

// ===== STRUCTURE =====
function applyStructure() {
  const lines = document.getElementById("structure").value.split("\n");

  files = {};
  lines.forEach(line => {
    const f = line.trim();
    if (f) files[f] = "";
  });

  step = 0;
  currentFile = Object.keys(files)[0] || "";

  renderTabs();
  loadCurrentFile();

  document.getElementById("explanation").innerText =
    "Structure applied.";
}

// ===== GENERATION =====
function generateStep() {

  const fileNames = Object.keys(files);

  if (fileNames.length === 0) {
    alert("Apply structure first");
    return;
  }

  if (step >= fileNames.length) {
    document.getElementById("explanation").innerText = "Build complete.";
    return;
  }

  currentFile = fileNames[step];

  document.getElementById("explanation").innerText =
    "Generating: " + currentFile;

  if (currentFile.endsWith(".html")) {
    files[currentFile] = `<h2>App UI</h2><div id="app"></div>`;
  }

  else if (currentFile.endsWith(".css")) {
    files[currentFile] = `body { font-family: Arial; text-align:center; }`;
  }

  else if (currentFile.endsWith(".js")) {
    files[currentFile] = `document.getElementById("app").innerText = "App Loaded";`;
  }

  else {
    files[currentFile] = `// Code for ${currentFile}`;
  }

  step++;

  loadCurrentFile();
  renderTabs();

  // AUTO PREVIEW
  applyCode();
}

// ===== APPLY =====
function applyCode() {
  saveCurrentFile();

  let html="", css="", js="";

  for (let f in files) {
    if (f.endsWith(".html")) html += files[f];
    else if (f.endsWith(".css")) css += files[f];
    else if (f.endsWith(".js")) js += files[f];
  }

  document.getElementById("preview").srcdoc =
    `<style>${css}</style>${html}<script>${js}<\/script>`;
}

// ===== RESET =====
function resetBuilder() {
  step = 0;
  currentFile = "";
  files = {};

  document.getElementById("chatLog").innerHTML = "";
  document.getElementById("chatInput").value = "";
  document.getElementById("structure").value = "";
  document.getElementById("code").value = "";
  document.getElementById("preview").srcdoc = "";
  document.getElementById("explanation").innerText = "Reset done.";

  renderTabs();
}

// INIT
renderTabs();

</script>

</body>
</html>
