<!DOCTYPE html>
<html>
<head>
  <title>Guided Builder</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #f4f6f8;
    }

    #left {
      width: 38%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
      padding: 10px;
      gap: 10px;
    }

    #right {
      width: 62%;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }

    .card h3 {
      margin: 0 0 5px 0;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
      padding: 6px;
      resize: none;
      font-size: 12px;
    }

    button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover { background: #1e4fd1; }

    .btn-row { display: flex; gap: 5px; margin-top: 5px; }

    #chatLog {
      height: 140px;
      overflow-y: auto;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 5px;
    }

    #fileTabs {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    #fileTabs button {
      background: #e5e7eb;
      color: black;
    }

    #fileTabs button.active {
      background: #2563eb;
      color: white;
    }

    #explanation {
      font-size: 12px;
      background: #eef2ff;
      padding: 6px;
      border-radius: 6px;
      margin-top: 5px;
      min-height: 40px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
    }
  </style>
</head>

<body>

<div id="left">

  <!-- CHAT -->
  <div class="card">
    <h3>💬 Chat</h3>
    <div id="chatLog"></div>
    <textarea id="chatInput" placeholder="Describe your app or project goal..."></textarea>
    <button onclick="processChat()">Send</button>
  </div>

  <!-- STRUCTURE -->
  <div class="card">
    <h3>📁 Structure</h3>
    <textarea id="structure"></textarea>
    <button onclick="applyStructure()">Apply</button>
  </div>

  <!-- CONTROLS -->
  <div class="card">
    <h3>⚙️ Controls</h3>
    <div class="btn-row">
      <button onclick="generateStep()">⚡ Generate</button>
      <button onclick="resetBuilder()" style="background:#ef4444;">Reset</button>
      <button onclick="resetChat()" style="background:#f59e0b;">Chat Reset</button>
    </div>
    <div id="explanation">Waiting for input...</div>
  </div>

  <!-- FILES -->
  <div class="card">
    <h3>📂 Files</h3>
    <div id="fileTabs"></div>
  </div>

  <!-- CODE -->
  <div class="card">
    <h3>💻 Code</h3>
    <textarea id="code" style="height:100%;"></textarea>
    <button onclick="applyCode()">Apply</button>
  </div>

</div>

<div id="right">
  <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<script>
const API_URL = "http://127.0.0.1:8000/generate-steps";
const RESET_CHAT_URL = "http://127.0.0.1:8000/reset-chat";

let step = 0;
let currentFile = "";
let files = {};
let generatedSteps = [];

// ===============================
// Validate filenames from model
// ===============================
function isValidFileName(name) {
  const validExtensions = [
    ".html", ".css", ".js", ".py",
    ".java", ".json", ".txt", ".md",
    ".ts", ".jsx", ".tsx", ".yml", ".yaml"
  ];
  if (!name || typeof name !== "string") return false;
  if (/[<>:"|?*]/.test(name)) return false;
  return validExtensions.some(ext => name.toLowerCase().endsWith(ext));
}

// ===============================
// CHAT WITH BACKEND
// ===============================
async function processChat() {
  const inputEl = document.getElementById("chatInput");
  const input = inputEl.value.trim();
  if (!input) return;

  const log = document.getElementById("chatLog");
  const explanation = document.getElementById("explanation");

  log.innerHTML += `<div><b>You:</b> ${input}</div>`;
  explanation.innerText = "⏳ Generating steps...";
  log.scrollTop = log.scrollHeight;

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ goal: input })
    });

    const data = await response.json();
    generatedSteps = data.steps || [];

    log.innerHTML += `<div><b>AI:</b> Generated ${generatedSteps.length} steps.</div>`;

    // Create dynamic structure from outputs
    const fileSet = new Set();
    generatedSteps.forEach(step => {
      if (Array.isArray(step.outputs)) {
        step.outputs.forEach(file => {
          if (isValidFileName(file)) {
            fileSet.add(file);
          }
        });
      }
    });

    // Fallback if no valid filenames
    if (fileSet.size === 0) {
      fileSet.add("main.py");
    }

    document.getElementById("structure").value =
      Array.from(fileSet).join("\n");

    explanation.innerText = "✅ Steps generated. Apply structure.";
    inputEl.value = "";

  } catch (error) {
    explanation.innerText = "❌ Error generating steps.";
    log.innerHTML += `<div style="color:red;"><b>Error:</b> ${error.message}</div>`;
  }
}

// ===============================
// CHAT RESET
// ===============================
async function resetChat() {
  await fetch(RESET_CHAT_URL, { method: "POST" });
  document.getElementById("chatLog").innerHTML = "";
  document.getElementById("chatInput").value = "";
  document.getElementById("explanation").innerText = "💬 Chat reset.";
}

// ===============================
// FILE MANAGEMENT
// ===============================
function renderTabs() {
  const container = document.getElementById("fileTabs");
  container.innerHTML = "";

  for (let file in files) {
    const btn = document.createElement("button");
    btn.innerText = file;
    if (file === currentFile) btn.classList.add("active");

    btn.onclick = () => {
      saveCurrentFile();
      currentFile = file;
      loadCurrentFile();
      renderTabs();
    };

    container.appendChild(btn);
  }
}

function applyStructure() {
  const lines = document.getElementById("structure").value.split("\n");

  files = {};
  lines.forEach(line => {
    const f = line.trim();
    if (isValidFileName(f)) {
      files[f] = "";
    }
  });

  step = 0;
  currentFile = Object.keys(files)[0] || "";

  renderTabs();
  loadCurrentFile();
  updatePreviewAvailability();
  document.getElementById("explanation").innerText =
    "📁 Structure applied. Click Generate to create files.";
}

function saveCurrentFile() {
  if (currentFile)
    files[currentFile] = document.getElementById("code").value;
}

function loadCurrentFile() {
  document.getElementById("code").value = files[currentFile] || "";
}

// ===============================
// STEP GENERATION
// ===============================
function generateStep() {
  const fileNames = Object.keys(files);
  if (fileNames.length === 0) {
    alert("Apply structure first");
    return;
  }

  if (step >= fileNames.length) {
    document.getElementById("explanation").innerText = "✅ Build complete.";
    return;
  }

  currentFile = fileNames[step];
  const stepData = generatedSteps[step];

  // Generate basic boilerplate based on extension
  if (currentFile.endsWith(".html")) {
    files[currentFile] =
`<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
</head>
<body>
  <h1>My Application</h1>
</body>
</html>`;
  } else if (currentFile.endsWith(".css")) {
    files[currentFile] =
`body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 50px;
}`;
  } else if (currentFile.endsWith(".js")) {
    files[currentFile] = `console.log("Application loaded successfully.");`;
  } else if (currentFile.endsWith(".py")) {
    files[currentFile] =
`def main():
    print("Application running")

if __name__ == "__main__":
    main()`;
  } else {
    files[currentFile] =
`# ${stepData?.title || "Generated File"}
# ${stepData?.description || "Auto-generated module"}`;
  }

  step++;
  loadCurrentFile();
  renderTabs();
  updatePreviewAvailability();
}

// ===============================
// PREVIEW HANDLING
// ===============================
function updatePreviewAvailability() {
  const fileNames = Object.keys(files);
  const hasHTML = fileNames.some(f => f.endsWith(".html"));

  if (hasHTML) {
    applyCode();
  } else {
    document.getElementById("preview").srcdoc = `
      <div style="padding:20px;font-family:sans-serif;">
        <h2>⚠️ Preview Not Available</h2>
        <p>This project type cannot be executed directly in the browser.</p>
        <p>You can still run the generated code locally.</p>
      </div>`;
  }
}

function applyCode() {
  // Ensure latest edits are saved
  saveCurrentFile();

  let html = "";
  let css = "";
  let js = "";

  // Collect file contents
  for (let f in files) {
    if (f.endsWith(".html")) html += files[f];
    if (f.endsWith(".css")) css += files[f];
    if (f.endsWith(".js")) js += files[f];
  }

  const previewFrame = document.getElementById("preview");

  // If no HTML file exists, show fallback message
  if (!html.trim()) {
    previewFrame.srcdoc = `
      <div style="padding:20px;font-family:sans-serif;">
        <h2>⚠️ Preview Not Available</h2>
        <p>This project type cannot be executed directly in the browser.</p>
        <p>You can still run the generated code locally.</p>
      </div>`;
    return;
  }

  const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  if (bodyMatch) {
    html = bodyMatch[1];
  }
  
  // Remove any <script> tags from HTML to prevent conflicts
  html = html.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "");

  // Build clean HTML document (HTML + CSS only)
  const fullDocument = `
    <!DOCTYPE html>
    <html>
      <head>
        <meta charset="UTF-8">
        <style>${css}</style>
      </head>
      <body>
        ${html}
      </body>
    </html>
  `;

  // Load HTML and CSS into iframe
  previewFrame.srcdoc = fullDocument;

  // Inject JavaScript safely after iframe loads
  previewFrame.onload = () => {
    try {
      const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      if (js.trim()) {
        const script = doc.createElement("script");
        script.textContent = js;
        doc.body.appendChild(script);
      }
    } catch (e) {
      console.error("Preview JS injection error:", e);
    }
  };
}

// ===============================
// FULL RESET
// ===============================
function resetBuilder() {
  step = 0;
  currentFile = "";
  files = {};
  generatedSteps = [];

  document.getElementById("chatLog").innerHTML = "";
  document.getElementById("chatInput").value = "";
  document.getElementById("structure").value = "";
  document.getElementById("code").value = "";
  document.getElementById("preview").srcdoc = "";
  document.getElementById("explanation").innerText = "🔄 Reset complete.";

  renderTabs();
}
</script>

</body>
</html>
